# ============================================================
# NETAQ Portal — Production Nginx Configuration
# Sprint 5: Deployment & DevOps
# ============================================================

user nginx;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ===== Logging =====
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ===== Performance =====
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # ===== Gzip Compression =====
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml;

    # ===== Client Settings =====
    client_max_body_size 100M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # ===== Rate Limiting Zones =====
    # Auth endpoints: 10 requests per minute per IP (Sprint 5 AC-9)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    # API endpoints: 30 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    # General: 50 requests per second per IP
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=50r/s;

    # ===== Upstream Servers =====
    upstream api_backend {
        server api:5000;
        keepalive 32;
    }

    upstream frontend_app {
        server frontend:80;
        keepalive 16;
    }

    # ===== HTTP → HTTPS Redirect (AC-2) =====
    server {
        listen 80;
        listen [::]:80;
        server_name netaq.pro www.netaq.pro;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check endpoint for Docker
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Redirect all other HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ===== HTTPS Server (Main) =====
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name netaq.pro www.netaq.pro;

        # ===== SSL Configuration =====
        ssl_certificate /etc/letsencrypt/live/netaq.pro/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/netaq.pro/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;

        # ===== Security Headers (AC-8) =====
        # HSTS with 1-year max-age
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        # Prevent clickjacking
        add_header X-Frame-Options "DENY" always;
        # Prevent MIME type sniffing
        add_header X-Content-Type-Options "nosniff" always;
        # XSS Protection
        add_header X-XSS-Protection "1; mode=block" always;
        # Referrer Policy
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Content Security Policy
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' wss://netaq.pro ws://netaq.pro https://netaq.pro; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        # Permissions Policy
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

        # ===== Auth API Routes (Strict Rate Limiting — AC-9) =====
        location ~ ^/api/v?1?/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ===== General API Routes =====
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # File upload support (100MB max)
            client_max_body_size 100M;
        }

        # ===== SignalR WebSocket =====
        location /hubs/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # ===== Swagger (Internal Platform — Always Enabled) =====
        location /swagger {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===== Health Check =====
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # ===== Frontend (Vue 3 SPA) — Default Route =====
        location / {
            limit_req zone=general_limit burst=30 nodelay;

            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # SPA fallback
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }

        # ===== Static Assets Caching =====
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ===== Block Sensitive Paths =====
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
