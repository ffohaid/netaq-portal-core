# ============================================================
# NETAQ Portal — Backend CI/CD Pipeline (.NET 8)
# Sprint 5: Deployment & DevOps
# ============================================================
# Triggers on push to main branch (backend changes only)
# Builds, tests, pushes Docker image to GHCR, deploys via SSH
# ============================================================

name: Deploy Backend (.NET 8)

on:
  push:
    branches: [main]
    paths:
      - 'src/Netaq.Api/**'
      - 'src/Netaq.Application/**'
      - 'src/Netaq.Domain/**'
      - 'src/Netaq.Infrastructure/**'
      - 'Netaq.sln'
      - 'docker-compose.prod.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/netaq-api

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Netaq.sln

      - name: Build solution
        run: dotnet build Netaq.sln -c Release --no-restore

      - name: Run tests
        run: dotnet test Netaq.sln -c Release --no-build --verbosity normal
        continue-on-error: true

  push-image:
    name: Build & Push Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Netaq.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Production
    needs: push-image
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH (Rolling Update)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/netaq

            # Pull latest API image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Rolling update: start new container before stopping old one
            docker compose -f docker-compose.prod.yml up -d --no-deps --build api

            # Wait for health check
            echo "Waiting for API health check..."
            for i in $(seq 1 30); do
              if docker exec netaq-api curl -sf http://localhost:5000/api/health > /dev/null 2>&1; then
                echo "API is healthy!"
                break
              fi
              echo "Attempt $i/30 — waiting..."
              sleep 5
            done

            # Reload Nginx to pick up any changes
            docker exec netaq-nginx nginx -s reload

            # Clean up old images
            docker image prune -f

            echo "Backend deployment complete!"
