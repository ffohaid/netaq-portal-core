# ============================================================
# NETAQ Portal — Frontend CI/CD Pipeline (Vue 3)
# Sprint 5: Deployment & DevOps
# ============================================================
# Triggers on push to main branch (frontend changes only)
# Builds, pushes Docker image to GHCR, deploys via SSH
# ============================================================

name: Deploy Frontend (Vue 3)

on:
  push:
    branches: [main]
    paths:
      - 'src/Netaq.Frontend/**'
      - 'docker-compose.prod.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/netaq-web

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Install dependencies
        working-directory: src/Netaq.Frontend
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Build project
        working-directory: src/Netaq.Frontend
        run: pnpm run build
        env:
          VITE_API_URL: https://netaq.pro

  push-image:
    name: Build & Push Docker Image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src/Netaq.Frontend
          file: src/Netaq.Frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Production
    needs: push-image
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH (Rolling Update)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/netaq

            # Pull latest frontend image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Rolling update: start new container before stopping old one
            docker compose -f docker-compose.prod.yml up -d --no-deps --build frontend

            # Reload Nginx
            docker exec netaq-nginx nginx -s reload

            # Clean up old images
            docker image prune -f

            echo "Frontend deployment complete!"
